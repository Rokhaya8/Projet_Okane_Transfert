<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <p class="mb-3">{{ data.message }}</p>
  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="w-100">
      <mat-label>Motif du rejet</mat-label>
      <textarea matInput rows="3" formControlName="reason"></textarea>
      @if (form.controls.reason.touched && form.controls.reason.hasError('required')) {
        <mat-error>Le motif est obligatoire</mat-error>
      }
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Annuler</button>
  <button mat-flat-button color="warn" (click)="submit()">Rejeter</button>
</mat-dialog-actions>
