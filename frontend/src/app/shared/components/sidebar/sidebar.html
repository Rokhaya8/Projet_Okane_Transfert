<div class="sidebar" [class.open]="isMobileMenuOpen">
  <div class="sidebar-brand">
    <span class="brand-okane">Okane</span>
    <span class="brand-transfer">Transfer</span>
  </div>

  <nav class="sidebar-links">
    <ng-container *ngIf="userRole === 'AGENT'">
      <a routerLink="/agent/dashboard" routerLinkActive="active" (click)="closeMenu()">
        <span class="material-icons">dashboard</span> Dashboard
      </a>
      <a routerLink="/agent/nouveau-transfert" routerLinkActive="active" (click)="closeMenu()">
        <span class="material-icons">send</span> Nouveau transfert
      </a>
      <a routerLink="/agent/payer-transfert" routerLinkActive="active" (click)="closeMenu()">
        <span class="material-icons">payments</span> Payer un retrait
      </a>
      <a routerLink="/agent/caisse" routerLinkActive="active" (click)="closeMenu()">
        <span class="material-icons">account_balance_wallet</span> Caisse
      </a>
      <a routerLink="/agent/historique" routerLinkActive="active" (click)="closeMenu()">
        <span class="material-icons">history</span> Historique
      </a>
    </ng-container>

    <ng-container *ngIf="userRole === 'CLIENT'">
      <a routerLink="/client/dashboard" routerLinkActive="active" (click)="closeMenu()">
        <span class="material-icons">dashboard</span> Mon Dashboard
      </a>
      <a routerLink="/client/suivre-transfert" routerLinkActive="active" (click)="closeMenu()">
        <span class="material-icons">track_changes</span> Suivre un transfert
      </a>
      <a routerLink="/client/historique" routerLinkActive="active" (click)="closeMenu()">
        <span class="material-icons">history</span> Mon Historique
      </a>
    </ng-container>
  </nav>

  <div class="sidebar-footer">
    <div class="agent-name" *ngIf="userRole === 'AGENT'">Mode Agent</div>
    <div class="agent-name" *ngIf="userRole === 'CLIENT'">Espace Client</div>
    <button class="btn-logout" (click)="logout()">Déconnexion</button>
  </div>
</div>

<div class="sidebar-overlay" *ngIf="isMobileMenuOpen" (click)="closeMenu()"></div>
